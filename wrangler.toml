# Cloudflare Pages configuration for Blueprints & Bookkeeping
# See DEPLOYMENT.md for full setup instructions.

name = "blueprints-bookkeeping"
pages_build_output_dir = "artifacts/website/dist/public"
compatibility_date = "2024-09-23"

# Workers Compatibility Flags
# Required for using Web Crypto API and standard fetch in Pages Functions.
compatibility_flags = ["nodejs_compat"]

[build]
command = "pnpm install --no-frozen-lockfile && pnpm --filter @workspace/website build"

# ──────────────────────────────────────────────────────────────────────────────
# Environment variable placeholders
# Set the real values in the Cloudflare Pages dashboard → Settings → Env Vars.
# DO NOT commit secret values here.
# ──────────────────────────────────────────────────────────────────────────────

# [vars]
# OWNER_EMAIL = "tea@blueprintsandbookkeeping.com"
# SITE_URL    = "https://blueprintsandbookkeeping.com"
# OPENAI_CHAT_MODEL = "gpt-4.1-mini"
#
# Secrets (set via dashboard, NOT here):
#   RESEND_API_KEY
#   OPENAI_API_KEY

# ──────────────────────────────────────────────────────────────────────────────
# Optional KV namespace for durable chat conversation storage.
# To enable, create a KV namespace in the Cloudflare dashboard and uncomment:
# ──────────────────────────────────────────────────────────────────────────────
# [[kv_namespaces]]
# binding = "CHAT_KV"
# id      = "<your-kv-namespace-id>"

# ──────────────────────────────────────────────────────────────────────────────
# Optional D1 database for newsletter subscribers (future enhancement).
# To enable, create a D1 database and uncomment:
# ──────────────────────────────────────────────────────────────────────────────
# [[d1_databases]]
# binding  = "DB"
# database_name = "blueprints-newsletter"
# database_id   = "<your-d1-database-id>"
