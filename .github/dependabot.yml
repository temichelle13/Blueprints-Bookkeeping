version: 2
runs-on: ubuntu-latest
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday" # Runs every Monday morning
    
    # 2. Auto-Labeling
    # Keeps your Pull Request tab beautifully organized
    labels:
      - "dependencies"
      
    # 3. Grouped Updates (The Game Changer!)
    # Instead of opening 10 different PRs for 10 different packages, 
    # this bundles all routine package updates into ONE single Pull Request.
    groups:
      all-dependencies:
        patterns:
          - "*"
