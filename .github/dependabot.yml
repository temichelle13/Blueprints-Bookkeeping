version: 2

updates:
  # Keep GitHub Actions versions updated
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    target-branch: "master"
    labels:
      - "dependencies"
      - "github_actions"

  # Node/TypeScript dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
    target-branch: "master"
    labels:
      - "dependencies"
    groups:
      all-dependencies:
        patterns:
          - "*"

  # Python dependencies (if you have requirements.txt/pyproject.toml/poetry.lock)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "daily"
    target-branch: "master"
    labels:
      - "dependencies"
      - "python"
