version: 2

updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    reviewers:
      - "temichelle13"
    labels:
      - "dependencies"
    groups:
      all-npm-dependencies:
        patterns:
          - "*"
    versioning-strategy: increase

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
      time: "06:15"
      timezone: "UTC"
    open-pull-requests-limit: 5
    reviewers:
      - "temichelle13"
    labels:
      - "dependencies"
      - "github-actions"
    groups:
      github-actions-dependencies:
        patterns:
          - "*"
