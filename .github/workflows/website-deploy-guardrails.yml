name: Website Deploy Guardrails

on:
  push:
  pull_request:

jobs:
  website-build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.13.1

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Fix Frozen Lockfile
        run: pnpm install --no-frozen-lockfile

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate website deployability
        run: pnpm run check:website-deploy
