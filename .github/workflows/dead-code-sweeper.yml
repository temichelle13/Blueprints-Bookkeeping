name: Dead Code Sweeper (Knip)
on: [push]

jobs:
  sweep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      # Knip finds unused files, dependencies, and exports.
      # DATABASE_URL is set to a placeholder so drizzle.config.ts can be
      # imported without throwing; no real DB connection is made during analysis.
      - name: Find Dead Code
        env:
          DATABASE_URL: "postgresql://example.invalid/placeholder"
        run: npx knip
