name: Python Checks

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Lint with Ruff
        run: |
          # Fails the build if Python syntax errors or undefined names are found
          ruff check . --output-format=github --exclude .agents
