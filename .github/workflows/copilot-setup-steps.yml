name: "Copilot Setup Steps"

on:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  workflow_dispatch:

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm' # Speeds up Copilot's environment creation

      - name: Install dependencies
        run: npm ci # Uses 'ci' instead of 'install' for exact, clean installations

      - name: Verify Build
        run: npm run build --if-present

      - name: Run Linters
        run: npm run lint --if-present

      - name: Run Tests
        run: npm test --if-present 
