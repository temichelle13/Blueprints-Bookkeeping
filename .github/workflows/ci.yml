name: CI Build & Test

on:
  pull_request:
    branches: ["master"] # Running on master since that's your default branch

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      # 1. We have to install pnpm first!
      #    No version pin here — pnpm/action-setup reads "packageManager" from package.json
      - name: Install pnpm
        uses: pnpm/action-setup@v3

      # 2. Setup Node.js and tell it to cache pnpm dependencies to make it fast
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      # 3. Install packages and build the project
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check route references
        run: pnpm run check:route-references

      - name: Build the project
        run: pnpm run build
