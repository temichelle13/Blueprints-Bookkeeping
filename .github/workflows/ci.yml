name: CI

on:
  pull_request:
    branches: ["master"]
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Lint, typecheck, tests, and build
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://user:pass@localhost:5432/test
      ADMIN_TOKEN: 00000000000000000000000000000000
      STRIPE_SECRET_KEY: sk_test_placeholder_for_ci_only
      STRIPE_WEBHOOK_SECRET: whsec_placeholder_for_ci_only
      OPENAI_API_KEY: sk-placeholder-for-ci-only
      NODE_ENV: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm run lint

      - name: Typecheck workspace
        run: pnpm run typecheck

      - name: Run website tests
        run: pnpm --filter @workspace/website run test

      - name: Run API tests
        run: pnpm --filter @workspace/api-server run test

      - name: Build workspace
        run: pnpm run build

      - name: Website deployment gate
        run: pnpm run check:website-deploy
