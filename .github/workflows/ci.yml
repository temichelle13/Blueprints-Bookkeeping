name: CI Build & Test

on:
  pull_request:
    branches: [ "master" ] # Running on master since that's your default branch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. We have to install pnpm first!
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.13.1

      # 2. Setup Node.js and tell it to cache pnpm dependencies to make it fast
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      # 3. Install packages and build the project
      - name: Install dependencies
        run: pnpm install

      - name: Build the project
        run: pnpm run build
