name: React Doctor Review

on:
  pull_request:
    branches: [ "main" ] # or 'master', depending on your default branch

permissions:
  contents: read
  pull-requests: write

jobs:
  react-doctor:
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout the code. fetch-depth: 0 is required for diff mode to work properly.
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 

      # 2. Run React Doctor
      - uses: millionco/react-doctor@main
        with:
          # Scans only the files changed against the main branch
          diff: main 
          
          # Crucial: Allows the bot to post findings directly as a comment on the PR
          github-token: ${{ secrets.GITHUB_TOKEN }}
          
          # Shows file details per rule for better context
          verbose: true 
          
          # Fails the CI check if it finds errors (prevents merging bad code)
          fail-on: error
