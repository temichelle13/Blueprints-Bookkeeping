name: Aria & API Live Health Monitor

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      api_base_url:
        description: "API base URL to test (e.g. https://blueprintsandbookkeeping.com/api)"
        required: false
        default: ""

permissions:
  contents: read
  issues: write

jobs:
  health-smoke-test:
    name: Live API + Aria Smoke Test
    runs-on: ubuntu-latest
    env:
      API_BASE: ${{ inputs.api_base_url || secrets.PRODUCTION_API_URL || 'https://blueprintsandbookkeeping.com/api' }}
      # Sent as a header so the Cloudflare WAF bypass rule can allowlist health-check
      # traffic and prevent Bot Fight Mode from returning a 403 challenge page.
      CF_BYPASS_HEADER: ${{ secrets.CF_HEALTH_BYPASS_TOKEN }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      # Optional Cloudflare WAF bypass header value. Configure a matching WAF rule in
      # Cloudflare to allow requests that carry this token so that Bot Fight Mode does
      # not challenge automated health-check traffic from GitHub Actions.
      CF_HEALTH_BYPASS_TOKEN: ${{ secrets.CF_HEALTH_BYPASS_TOKEN }}

    steps:
      - name: Health check — /api/healthz
        id: healthz
        run: |
          # Build curl args as a bash array to avoid eval and shell-injection risks.
          CURL_ARGS=(
            -s
            --connect-timeout 5
            --max-time 15
            -o /tmp/healthz.json
            -w "%{http_code}"
            -H "User-Agent: Blueprints-Health-Monitor/1.0 (github-actions)"
          )
          # Append the Cloudflare WAF bypass header only when the secret is set.
          # Configure a matching WAF rule in Cloudflare to allow these requests.
          if [ -n "$CF_HEALTH_BYPASS_TOKEN" ]; then
            CURL_ARGS+=(-H "X-Health-Bypass-Token: $CF_HEALTH_BYPASS_TOKEN")
          fi

          STATUS=$(curl "${CURL_ARGS[@]}" "$API_BASE/healthz")
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          cat /tmp/healthz.json

          # 200 = healthy, 503 = degraded but reachable; anything else is unexpected.
          if [ "$STATUS" != "200" ] && [ "$STATUS" != "503" ]; then
            # Detect Cloudflare Bot Fight Mode challenge pages (403 with HTML body).
            if [ "$STATUS" = "403" ] && grep -q "challenges.cloudflare.com" /tmp/healthz.json 2>/dev/null; then
              echo "❌ Cloudflare Bot Fight Mode is blocking this health check (HTTP 403 challenge page)."
              echo "   Fix: create a Cloudflare WAF bypass rule keyed on the 'X-Health-Bypass-Token'"
              echo "   header and set the CF_HEALTH_BYPASS_TOKEN secret in this repository's Actions settings."
            else
              echo "❌ /healthz returned unexpected HTTP $STATUS (expected 200 or 503)"
            fi
            exit 1
          fi

      - name: Check for degraded dependencies
        id: degraded
        run: |
          OVERALL=$(jq -r '.status // "unknown"' /tmp/healthz.json 2>/dev/null || echo "unknown")
          echo "overall=$OVERALL" >> "$GITHUB_OUTPUT"
          if [ "$OVERALL" = "degraded" ]; then
            echo "⚠️ API reports degraded status:"
            cat /tmp/healthz.json | jq .
          fi

      - name: Aria smoke test — create conversation + send message
        id: aria
        run: |
          # Build curl args as a bash array to avoid eval and shell-injection risks.
          BASE_CURL_ARGS=(
            -s
            -H "User-Agent: Blueprints-Health-Monitor/1.0 (github-actions)"
          )
          if [ -n "$CF_HEALTH_BYPASS_TOKEN" ]; then
            BASE_CURL_ARGS+=(-H "X-Health-Bypass-Token: $CF_HEALTH_BYPASS_TOKEN")
          fi

          CONV_STATUS=$(curl "${BASE_CURL_ARGS[@]}" \
            -o /tmp/conv.json \
            -w "%{http_code}" \
            --max-time 15 \
            -X POST "$API_BASE/openai/conversations" \
            -H "Content-Type: application/json" \
            -d '{"title":"CI Health Smoke Test"}')
          CONV_BODY=$(cat /tmp/conv.json)
          echo "Create conversation status: $CONV_STATUS"

          if [ "$CONV_STATUS" != "201" ]; then
            echo "❌ Failed to create Aria conversation (HTTP $CONV_STATUS)"
            echo "aria_ok=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CONV_ID=$(echo "$CONV_BODY" | jq -r '.id // empty')
          if [ -z "$CONV_ID" ] || [ "$CONV_ID" = "null" ]; then
            echo "❌ Create conversation response missing conversation id"
            echo "aria_ok=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "conv_id=$CONV_ID" >> "$GITHUB_OUTPUT"
          echo "✅ Conversation created: #$CONV_ID"

          MSG_STATUS=$(curl "${BASE_CURL_ARGS[@]}" \
            -o /tmp/aria_stream.txt \
            -w "%{http_code}" \
            --max-time 15 \
            -X POST "$API_BASE/openai/conversations/$CONV_ID/messages" \
            -H "Content-Type: application/json" \
            -H "Accept: text/event-stream" \
            -H "X-Health-Check-Token: $CF_BYPASS_HEADER" \
            -d '{"content":"Hello, are you online?"}')

          echo "Send message status: $MSG_STATUS"
          head -c 500 /tmp/aria_stream.txt

          if [ "$MSG_STATUS" = "200" ]; then
            echo "aria_ok=true" >> "$GITHUB_OUTPUT"
            echo "✅ Aria SSE stream responded"
          else
            echo "aria_ok=false" >> "$GITHUB_OUTPUT"
            echo "❌ Aria message endpoint returned HTTP $MSG_STATUS"
          fi

          curl -s -X DELETE "$API_BASE/openai/conversations/$CONV_ID" \
            -H "X-Health-Check-Token: $CF_BYPASS_HEADER" || true

      - name: Close resolved health-alert issues on success
        if: success() && steps.aria.outputs.aria_ok != 'false' && steps.degraded.outputs.overall != 'degraded'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'health-alert',
            });

            for (const issue of issues) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `✅ **Production API recovered.**\n\nAll health checks passed at ${new Date().toUTCString()}.\n\nCheck: [workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
              });
              console.log(`Closed health-alert issue #${issue.number}`);
            }

      - name: Open GitHub Issue on failure
        if: failure() || steps.aria.outputs.aria_ok == 'false' || steps.degraded.outputs.overall == 'degraded'
        uses: actions/github-script@v7
        with:
          script: |
            const ariaOk = '${{ steps.aria.outputs.aria_ok }}';
            const degraded = '${{ steps.degraded.outputs.overall }}';
            const apiBase = process.env.API_BASE;

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'health-alert',
            });

            if (issues.length > 0) {
              console.log('Health alert issue already open — skipping duplicate');
              return;
            }

            let title = '🚨 Production Health Alert';
            let body = `## Production API Health Alert\n\n**Detected at:** ${new Date().toUTCString()}\n**API Base:** ${apiBase}\n\n`;

            if (ariaOk === 'false') {
              title = '🚨 Aria Chat Offline — Lead Capture at Risk';
              body += `### ❌ Aria Chat Endpoint Failed\nThe \`POST /openai/conversations/:id/messages\` SSE endpoint did not respond correctly.\n\n**Impact:** Visitors cannot use Aria to get service info or leave their contact details — Tea may miss inbound leads.\n\n`;
            }
            if (degraded === 'degraded') {
              body += `### ⚠️ API Reports Degraded Status\nOne or more backend dependencies (DB, OpenAI, Resend, Adobe Sign) may be unhealthy. Check \`/api/healthz\` for details.\n\n`;
            }

            body += `**Action:** Check the [workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) for full logs and verify the deployment is healthy.`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['health-alert', 'urgent'],
            });
