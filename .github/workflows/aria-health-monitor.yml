name: Aria & API Live Health Monitor

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      api_base_url:
        description: "API base URL to test (e.g. https://blueprintsandbookkeeping.com/api)"
        required: false
        default: ""

permissions:
  contents: read
  issues: write

jobs:
  health-smoke-test:
    name: Live API + Aria Smoke Test
    runs-on: ubuntu-latest
    env:
      API_BASE: ${{ inputs.api_base_url || secrets.PRODUCTION_API_URL || 'https://blueprintsandbookkeeping.com/api' }}

    steps:
      - name: Health check — /api/healthz
        id: healthz
        run: |
          STATUS=$(curl -s -o /tmp/healthz.json -w "%{http_code}" "$API_BASE/healthz")
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          cat /tmp/healthz.json
          # 200 = healthy, 503 = degraded but reachable; anything else is unexpected
          if [ "$STATUS" != "200" ] && [ "$STATUS" != "503" ]; then
            echo "❌ /healthz returned unexpected HTTP $STATUS (expected 200 or 503)"
            exit 1
          fi

      - name: Check for degraded dependencies
        id: degraded
        run: |
          OVERALL=$(jq -r '.status // "unknown"' /tmp/healthz.json 2>/dev/null || echo "unknown")
          echo "overall=$OVERALL" >> "$GITHUB_OUTPUT"
          if [ "$OVERALL" = "degraded" ]; then
            echo "⚠️ API reports degraded status:"
            cat /tmp/healthz.json | jq .
          fi

      - name: Aria smoke test — create conversation + send message
        id: aria
        run: |
          CONV_RESP=$(curl -s -X POST "$API_BASE/openai/conversations" \
            -H "Content-Type: application/json" \
            -d '{"title":"CI Health Smoke Test"}' \
            -w "\n%{http_code}")
          CONV_BODY=$(echo "$CONV_RESP" | head -n1)
          CONV_STATUS=$(echo "$CONV_RESP" | tail -n1)
          echo "Create conversation status: $CONV_STATUS"

          if [ "$CONV_STATUS" != "201" ]; then
            echo "❌ Failed to create Aria conversation (HTTP $CONV_STATUS)"
            echo "aria_ok=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CONV_ID=$(echo "$CONV_BODY" | jq -r '.id')
          echo "conv_id=$CONV_ID" >> "$GITHUB_OUTPUT"
          echo "✅ Conversation created: #$CONV_ID"

          MSG_STATUS=$(curl -s -o /tmp/aria_stream.txt -w "%{http_code}" \
            --max-time 15 \
            -X POST "$API_BASE/openai/conversations/$CONV_ID/messages" \
            -H "Content-Type: application/json" \
            -H "Accept: text/event-stream" \
            -d '{"content":"Hello, are you online?"}')

          echo "Send message status: $MSG_STATUS"
          head -c 500 /tmp/aria_stream.txt

          if [ "$MSG_STATUS" = "200" ]; then
            echo "aria_ok=true" >> "$GITHUB_OUTPUT"
            echo "✅ Aria SSE stream responded"
          else
            echo "aria_ok=false" >> "$GITHUB_OUTPUT"
            echo "❌ Aria message endpoint returned HTTP $MSG_STATUS"
          fi

          curl -s -X DELETE "$API_BASE/openai/conversations/$CONV_ID" || true

      - name: Open GitHub Issue on failure
        if: failure() || steps.aria.outputs.aria_ok == 'false' || steps.degraded.outputs.overall == 'degraded'
        uses: actions/github-script@v7
        with:
          script: |
            const ariaOk = '${{ steps.aria.outputs.aria_ok }}';
            const degraded = '${{ steps.degraded.outputs.overall }}';
            const apiBase = process.env.API_BASE;

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'health-alert',
            });

            if (issues.length > 0) {
              console.log('Health alert issue already open — skipping duplicate');
              return;
            }

            let title = '🚨 Production Health Alert';
            let body = `## Production API Health Alert\n\n**Detected at:** ${new Date().toUTCString()}\n**API Base:** ${apiBase}\n\n`;

            if (ariaOk === 'false') {
              title = '🚨 Aria Chat Offline — Lead Capture at Risk';
              body += `### ❌ Aria Chat Endpoint Failed\nThe \`POST /openai/conversations/:id/messages\` SSE endpoint did not respond correctly.\n\n**Impact:** Visitors cannot use Aria to get service info or leave their contact details — Tea may miss inbound leads.\n\n`;
            }
            if (degraded === 'degraded') {
              body += `### ⚠️ API Reports Degraded Status\nOne or more backend dependencies (DB, OpenAI, Resend, Adobe Sign) may be unhealthy. Check \`/api/healthz\` for details.\n\n`;
            }

            body += `**Action:** Check the [workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) for full logs and verify the deployment is healthy.`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['health-alert', 'urgent'],
            });
